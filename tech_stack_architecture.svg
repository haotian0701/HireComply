<svg width="100%" viewBox="0 0 680 700">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 1: Frontend -->
<g class="c-gray">
  <rect x="40" y="30" width="600" height="90" rx="16" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="th" x="60" y="55" dominant-baseline="central">Frontend layer</text>
</g>
<g class="c-teal">
  <rect x="60" y="70" width="160" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="140" y="88" text-anchor="middle" dominant-baseline="central">Streamlit / Gradio</text>
</g>
<g class="c-teal">
  <rect x="240" y="70" width="190" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="335" y="88" text-anchor="middle" dominant-baseline="central">LangGraph Studio</text>
</g>
<g class="c-gray">
  <rect x="450" y="70" width="170" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="535" y="88" text-anchor="middle" dominant-baseline="central">React (optional v2)</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="120" x2="340" y2="160" class="arr" marker-end="url(#arrow)"/>

<!-- Layer 2: API -->
<g class="c-gray">
  <rect x="40" y="160" width="600" height="90" rx="16" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="th" x="60" y="185" dominant-baseline="central">API layer</text>
</g>
<g class="c-purple">
  <rect x="160" y="200" width="160" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="240" y="218" text-anchor="middle" dominant-baseline="central">FastAPI</text>
</g>
<g class="c-purple">
  <rect x="360" y="200" width="180" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="450" y="218" text-anchor="middle" dominant-baseline="central">REST + WebSocket</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="250" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

<!-- Layer 3: Orchestration (core) -->
<g class="c-teal">
  <rect x="40" y="290" width="600" height="140" rx="16" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="th" x="60" y="315" dominant-baseline="central">Orchestration layer (core)</text>
</g>

<g class="c-teal">
  <rect x="60" y="335" width="170" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="145" y="350" text-anchor="middle" dominant-baseline="central">LangGraph</text>
  <text class="ts" x="145" y="368" text-anchor="middle" dominant-baseline="central">State graph engine</text>
</g>
<g class="c-purple">
  <rect x="250" y="335" width="170" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="335" y="350" text-anchor="middle" dominant-baseline="central">LangChain</text>
  <text class="ts" x="335" y="368" text-anchor="middle" dominant-baseline="central">Model + tool integrations</text>
</g>
<g class="c-amber">
  <rect x="440" y="335" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="530" y="350" text-anchor="middle" dominant-baseline="central">LangSmith</text>
  <text class="ts" x="530" y="368" text-anchor="middle" dominant-baseline="central">Tracing + evals</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="430" x2="340" y2="470" class="arr" marker-end="url(#arrow)"/>

<!-- Layer 4: Data -->
<g class="c-gray">
  <rect x="40" y="470" width="600" height="90" rx="16" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="th" x="60" y="495" dominant-baseline="central">Data layer</text>
</g>
<g class="c-blue">
  <rect x="60" y="510" width="200" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="160" y="528" text-anchor="middle" dominant-baseline="central">PostgreSQL + checkpointer</text>
</g>
<g class="c-blue">
  <rect x="280" y="510" width="160" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="360" y="528" text-anchor="middle" dominant-baseline="central">ChromaDB (optional)</text>
</g>
<g class="c-blue">
  <rect x="460" y="510" width="160" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="540" y="528" text-anchor="middle" dominant-baseline="central">File storage (S3)</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="560" x2="340" y2="600" class="arr" marker-end="url(#arrow)"/>

<!-- Layer 5: LLM providers -->
<g class="c-gray">
  <rect x="40" y="600" width="600" height="90" rx="16" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text class="th" x="60" y="625" dominant-baseline="central">LLM providers</text>
</g>
<g class="c-coral">
  <rect x="80" y="640" width="140" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="150" y="658" text-anchor="middle" dominant-baseline="central">OpenAI GPT-4o</text>
</g>
<g class="c-coral">
  <rect x="240" y="640" width="160" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="320" y="658" text-anchor="middle" dominant-baseline="central">Anthropic Claude</text>
</g>
<g class="c-coral">
  <rect x="420" y="640" width="200" height="36" rx="6" stroke-width="0.5"/>
  <text class="ts" x="520" y="658" text-anchor="middle" dominant-baseline="central">Open-source (Llama)</text>
</g>
</svg>